    metrics_path: /actuator/prometheus

  - job_name: lms-loan-management-service
    static_configs:
      - targets: ["lms-loan-management-service:8089"]
    metrics_path: /actuator/prometheus

  - job_name: lms-payment-service
    static_configs:
      - targets: ["lms-payment-service:8090"]
    metrics_path: /actuator/prometheus

  - job_name: lms-accounting-service
    static_configs:
      - targets: ["lms-accounting-service:8091"]
